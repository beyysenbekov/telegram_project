<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход через Telegram - TaskManager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="bg-light">
    <div class="container">
        <div class="row justify-content-center mt-5">
            <div class="col-md-6 col-lg-5">
                <div class="card shadow">
                    <div class="card-body p-5 text-center">
                        <div class="mb-4">
                            <h2 class="fw-bold">📋 TaskManager</h2>
                            <p class="text-muted">Вход через Telegram</p>
                        </div>

                        <div id="loginStatus">
                            <div class="spinner-border text-primary mb-3" role="status">
                                <span class="visually-hidden">Загрузка...</span>
                            </div>
                            <p class="text-muted">Выполняется автоматический вход...</p>
                        </div>

                        <div id="alertContainer" class="mt-3"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://telegram.org/js/telegram-widget.js?22"></script>
    <script>
        const API_URL = '/api';

        // Показать сообщение
        function showAlert(message, type = 'danger') {
            const alertContainer = document.getElementById('alertContainer');
            alertContainer.innerHTML = `
                <div class="alert alert-${type} alert-dismissible fade show" role="alert">
                    ${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            `;
        }

        // Автоматический вход через Telegram
        async function autoLoginTelegram() {
            // Получаем данные из URL параметров (переданные из Telegram Widget)
            const urlParams = new URLSearchParams(window.location.search);
            
            const telegram_id = urlParams.get('id');
            const first_name = urlParams.get('first_name') || 'Пользователь';
            const username = urlParams.get('username');

            if (!telegram_id) {
                // Если нет telegram_id, показываем виджет входа
                showTelegramWidget();
                return;
            }

            try {
                const response = await fetch(`${API_URL}/auth/telegram-login`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        telegram_id: parseInt(telegram_id),
                        first_name: first_name,
                        username: username
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    // Сохраняем токен
                    localStorage.setItem('token', data.access_token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    
                    // Показываем успех
                    document.getElementById('loginStatus').innerHTML = `
                        <div class="text-success mb-3">
                            <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" fill="currentColor" class="bi bi-check-circle" viewBox="0 0 16 16">
                                <path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14zm0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16z"/>
                                <path d="M10.97 4.97a.235.235 0 0 0-.02.022L7.477 9.417 5.384 7.323a.75.75 0 0 0-1.06 1.06L6.97 11.03a.75.75 0 0 0 1.079-.02l3.992-4.99a.75.75 0 0 0-1.071-1.05z"/>
                            </svg>
                        </div>
                        <h5>✅ Вход выполнен!</h5>
                        <p class="text-muted">Перенаправление...</p>
                    `;
                    
                    // Перенаправляем в дашборд
                    setTimeout(() => {
                        window.location.href = '/dashboard';
                    }, 1000);
                } else {
                    showAlert(data.detail || 'Ошибка входа');
                    showTelegramWidget();
                }
            } catch (error) {
                showAlert('Ошибка подключения к серверу');
                console.error(error);
                showTelegramWidget();
            }
        }

        // Показать виджет Telegram Login
        function showTelegramWidget() {
            document.getElementById('loginStatus').innerHTML = `
                <h5 class="mb-4">Войти через Telegram</h5>
                <p class="text-muted mb-4">Нажмите кнопку ниже для входа</p>
                <div id="telegram-login-widget"></div>
                <div class="mt-4">
                    <a href="/login" class="text-muted">← Вход по email</a>
                </div>
            `;

            // ВАЖНО: Замени 'YOUR_BOT_USERNAME' на username твоего бота (без @)
            const botUsername = 'testbotaikz_bot'; // <-- ИЗМЕНИ ЭТО!
            const script = document.createElement('script');
            script.async = true;
            script.src = 'https://telegram.org/js/telegram-widget.js?22';
            script.setAttribute('data-telegram-login', botUsername);
            script.setAttribute('data-size', 'large');
            script.setAttribute('data-radius', '10');
            script.setAttribute('data-auth-url', window.location.origin + '/telegram-login');
            script.setAttribute('data-request-access', 'write');
            
            document.getElementById('telegram-login-widget').appendChild(script);
        }

        // Запуск при загрузке страницы
        autoLoginTelegram();
    </script>
</body>
</html>
