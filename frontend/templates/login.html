<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - TaskManager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="bg-light">
    <div class="container">
        <div class="row justify-content-center mt-5">
            <div class="col-md-6 col-lg-5">
                <div class="card shadow">
                    <div class="card-body p-5">
                        <div class="text-center mb-4">
                            <h2 class="fw-bold">📋 TaskManager</h2>
                            <p class="text-muted">Управление задачами</p>
                        </div>

                        <!-- Кнопка входа через Telegram -->
                        <div class="mb-4">
                            <a href="/telegram-login" class="btn btn-primary w-100 d-flex align-items-center justify-content-center" style="gap: 10px;">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-telegram" viewBox="0 0 16 16">
                                    <path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0zM8.287 5.906c-.778.324-2.334.994-4.666 2.01-.378.15-.577.298-.595.442-.03.243.275.339.69.47l.175.055c.408.133.958.288 1.243.294.26.006.549-.1.868-.32 2.179-1.471 3.304-2.214 3.374-2.23.05-.012.12-.026.166.016.047.041.042.12.037.141-.03.129-1.227 1.241-1.846 1.817-.193.18-.33.307-.358.336a8.154 8.154 0 0 1-.188.186c-.38.366-.664.64.015 1.088.327.216.589.393.85.571.284.194.568.387.936.629.093.06.183.125.27.187.331.236.63.448.997.414.214-.02.435-.22.547-.82.265-1.417.786-4.486.906-5.751a1.426 1.426 0 0 0-.013-.315.337.337 0 0 0-.114-.217.526.526 0 0 0-.31-.093c-.3.005-.763.166-2.984 1.09z"/>
                                </svg>
                                Войти через Telegram
                            </a>
                        </div>

                        <div class="text-center mb-3">
                            <small class="text-muted">или используйте email</small>
                        </div>

                        <!-- Переключатель Вход/Регистрация -->
                        <ul class="nav nav-pills nav-justified mb-4" id="authTabs" role="tablist">
                            <li class="nav-item" role="presentation">
                                <button class="nav-link active" id="login-tab" data-bs-toggle="pill" 
                                        data-bs-target="#login" type="button">
                                    Вход
                                </button>
                            </li>
                            <li class="nav-item" role="presentation">
                                <button class="nav-link" id="register-tab" data-bs-toggle="pill" 
                                        data-bs-target="#register" type="button">
                                    Регистрация
                                </button>
                            </li>
                        </ul>

                        <div class="tab-content" id="authTabsContent">
                            <!-- ФОРМА ВХОДА -->
                            <div class="tab-pane fade show active" id="login" role="tabpanel">
                                <form id="loginForm">
                                    <div class="mb-3">
                                        <label for="loginEmail" class="form-label">Email</label>
                                        <input type="email" class="form-control" id="loginEmail" required>
                                    </div>
                                    <div class="mb-3">
                                        <label for="loginPassword" class="form-label">Пароль</label>
                                        <input type="password" class="form-control" id="loginPassword" required>
                                    </div>
                                    <div class="d-grid">
                                        <button type="submit" class="btn btn-primary">
                                            Войти
                                        </button>
                                    </div>
                                </form>
                            </div>

                            <!-- ФОРМА РЕГИСТРАЦИИ -->
                            <div class="tab-pane fade" id="register" role="tabpanel">
                                <form id="registerForm">
                                    <div class="mb-3">
                                        <label for="registerName" class="form-label">Имя</label>
                                        <input type="text" class="form-control" id="registerName" required>
                                    </div>
                                    <div class="mb-3">
                                        <label for="registerEmail" class="form-label">Email</label>
                                        <input type="email" class="form-control" id="registerEmail" required>
                                    </div>
                                    <div class="mb-3">
                                        <label for="registerPassword" class="form-label">Пароль</label>
                                        <input type="password" class="form-control" id="registerPassword" 
                                               required minlength="6">
                                        <div class="form-text">Минимум 6 символов</div>
                                    </div>
                                    <div class="mb-3">
                                        <label for="registerTelegram" class="form-label">
                                            Telegram ID (опционально)
                                        </label>
                                        <input type="number" class="form-control" id="registerTelegram">
                                        <div class="form-text">
                                            Для синхронизации с ботом. Узнать ID: @userinfobot
                                        </div>
                                    </div>
                                    <div class="d-grid">
                                        <button type="submit" class="btn btn-primary">
                                            Зарегистрироваться
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>

                        <!-- Сообщения -->
                        <div id="alertContainer" class="mt-3"></div>

                        <div class="text-center mt-4">
                            <a href="/" class="text-muted">← Вернуться на главную</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_URL = '/api';

        // Показать сообщение
        function showAlert(message, type = 'danger') {
            const alertContainer = document.getElementById('alertContainer');
            alertContainer.innerHTML = `
                <div class="alert alert-${type} alert-dismissible fade show" role="alert">
                    ${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            `;
        }

        // ВХОД
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    // Сохраняем токен
                    localStorage.setItem('token', data.access_token);
                    
                    // Перенаправляем в дашборд
                    showAlert('Успешный вход! Перенаправление...', 'success');
                    setTimeout(() => {
                        window.location.href = '/dashboard';
                    }, 1000);
                } else {
                    showAlert(data.detail || 'Ошибка входа');
                }
            } catch (error) {
                showAlert('Ошибка подключения к серверу');
                console.error(error);
            }
        });

        // РЕГИСТРАЦИЯ
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const first_name = document.getElementById('registerName').value;
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;
            const telegram_id = document.getElementById('registerTelegram').value || null;

            try {
                const response = await fetch(`${API_URL}/auth/register`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ 
                        email, 
                        password, 
                        first_name,
                        telegram_id: telegram_id ? parseInt(telegram_id) : null
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    showAlert('Регистрация успешна! Теперь войдите в систему.', 'success');
                    
                    // Переключаем на вкладку входа
                    setTimeout(() => {
                        document.getElementById('login-tab').click();
                        document.getElementById('loginEmail').value = email;
                    }, 1500);
                } else {
                    showAlert(data.detail || 'Ошибка регистрации');
                }
            } catch (error) {
                showAlert('Ошибка подключения к серверу');
                console.error(error);
            }
        });
    </script>
</body>
</html>
